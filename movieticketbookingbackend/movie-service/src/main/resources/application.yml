server:
  port: 8082

spring:
  application:
    name: movie-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/movie_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root        # Change to your MySQL username
    password: root        # Change to your MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: MovieServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka-password@localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.moviebooking: DEBUG
    org.hibernate.SQL: DEBUG
